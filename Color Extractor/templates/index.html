<!DOCTYPE html>
<html>

<head>
    <title>Color Extractor 🎨</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        p {
            color: #ddd;
        }

        .container {
            background: white;
            color: black;
            width: 80%;
            max-width: 700px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        #drop-area {
            border: 2px dashed #aaa;
            padding: 30px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #drop-area:hover {
            background: #f5f5f5;
        }

        #preview {
            margin-top: 20px;
            display: none;
        }

        #preview img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #loading {
            display: none;
            font-size: 18px;
            margin-top: 20px;
            color: #333;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 100%;
            display: none;
        }

        th {
            background: #667eea;
            color: white;
        }

        td,
        th {
            padding: 12px;
            border: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            margin: auto;
        }
    </style>
</head>

<body>

    <h1>🎨 Color Extractor</h1>
    <p>Upload an image to find its dominant colors</p>

    <div class="container">

        <div id="drop-area">
            <strong>Drag & Drop Image</strong><br>or click to upload
            <input type="file" id="fileElem" accept="image/*" hidden>
        </div>

        <!-- IMAGE PREVIEW -->
        <div id="preview">
            <h3>Preview</h3>
            <img id="previewImg">
        </div>

        <p id="loading">⏳ Processing image...<br>This might take a few minutes.</p>

        <table id="resultTable">
            <thead>
                <tr>
                    <th>Color</th>
                    <th>RGB</th>
                    <th>Percentage</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

    <script>
        let isProcessing = false;

        const dropArea = document.getElementById("drop-area");
        const fileInput = document.getElementById("fileElem");
        const preview = document.getElementById("preview");
        const previewImg = document.getElementById("previewImg");

        // click upload
        dropArea.onclick = () => fileInput.click();

        // drag over
        dropArea.addEventListener("dragover", e => {
            e.preventDefault();
        });

        // drop
        dropArea.addEventListener("drop", e => {
            e.preventDefault();

            if (e.dataTransfer.files.length === 0) {
                alert("No file dropped!");
                return;
            }

            handleFile(e.dataTransfer.files[0]);
        });

        // file select
        fileInput.addEventListener("change", () => {
            if (fileInput.files.length === 0) {
                alert("Please select an image!");
                return;
            }

            handleFile(fileInput.files[0]);
        });

        // HANDLE FILE
        function handleFile(file) {
            if (isProcessing) {
                alert("Please wait until current image is processed!");
                return;
            }

            if (!file) {
                alert("No file selected!");
                return;
            }

            // show preview
            const reader = new FileReader();
            reader.onload = function (e) {
                previewImg.src = e.target.result;
                preview.style.display = "block";
            };
            reader.readAsDataURL(file);

            uploadFile(file);
        }

        // UPLOAD
        function uploadFile(file) {
            isProcessing = true;  // 🔒 LOCK

            // disable upload area
            dropArea.style.pointerEvents = "none";
            dropArea.style.opacity = "0.5";

            let formData = new FormData();
            formData.append("file", file);

            document.getElementById("loading").style.display = "block";
            document.getElementById("resultTable").style.display = "none";

            fetch("/upload", {
                method: "POST",
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    displayTable(data);
                })
                .catch(() => {
                    alert("Error processing image");
                })
                .finally(() => {
                    // 🔓 UNLOCK after done
                    isProcessing = false;

                    dropArea.style.pointerEvents = "auto";
                    dropArea.style.opacity = "1";

                    document.getElementById("loading").style.display = "none";
                });
        }

        // DISPLAY TABLE
        function displayTable(data) {
            const table = document.getElementById("resultTable");
            const tbody = table.querySelector("tbody");

            tbody.innerHTML = "";

            data.forEach(item => {
                const [color, percentage] = item;

                let row = `
            <tr>
                <td>
                    <div class="color-box" style="background: rgb(${color[0]}, ${color[1]}, ${color[2]})"></div>
                </td>
                <td>(${color[0]}, ${color[1]}, ${color[2]})</td>
                <td>${(percentage * 100).toFixed(2)}%</td>
            </tr>
        `;

                tbody.innerHTML += row;
            });

            table.style.display = "table";
        }
    </script>

</body>

</html>
